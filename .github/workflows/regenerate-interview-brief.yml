name: Regenerate clarified interview brief

on:
  push:
    paths:
      - 'interview-brief.html'
      - '.github/workflows/regenerate-interview-brief.yml'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PDF inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Render interview brief
        shell: bash
        run: |
          set -euo pipefail
          browser="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium || true)"
          test -n "$browser"
          output='docs/Russell-Dudek-Westinghouse-Interview-Thesis-Brief.pdf'
          rm -f "$output"
          timeout 90 "$browser" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --disable-dev-shm-usage \
            --disable-background-networking \
            --disable-extensions \
            --no-first-run \
            --no-pdf-header-footer \
            --run-all-compositor-stages-before-draw \
            --virtual-time-budget=1500 \
            --print-to-pdf="$output" \
            "file://$PWD/interview-brief.html"
          test -s "$output"

      - name: Verify four-page contract and revised language
        shell: bash
        run: |
          set -euo pipefail
          pdf='docs/Russell-Dudek-Westinghouse-Interview-Thesis-Brief.pdf'
          test "$(pdfinfo "$pdf" | awk '/^Pages:/ {print $2}')" = '4'
          test "$(stat -c %s "$pdf")" -gt 25000
          pdftotext "$pdf" /tmp/interview-brief.txt
          grep -Fq 'What I would build' /tmp/interview-brief.txt
          grep -Fq 'A practical AI governance system that travels with the work.' /tmp/interview-brief.txt
          grep -Fq 'Research basis:' /tmp/interview-brief.txt
          ! grep -Fq 'White-space proposition' /tmp/interview-brief.txt

      - name: Commit regenerated PDF
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Russell Dudek'
          git config user.email '35631821+russelldudek@users.noreply.github.com'
          git add docs/Russell-Dudek-Westinghouse-Interview-Thesis-Brief.pdf
          git commit -m 'Regenerate clarified interview brief PDF'
          git push origin main
