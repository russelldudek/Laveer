name: Publish Laveer candidate campaign

on:
  push:
    paths:
      - '.github/workflows/publish-laveer-campaign.yml'

permissions:
  contents: write

concurrency:
  group: publish-laveer-campaign
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Acquire verified campaign source
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main https://github.com/russelldudek/Westinghouse.git /tmp/westinghouse
          test -f /tmp/westinghouse/ai-governance/index.html
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' -exec rm -rf {} +
          cp -a /tmp/westinghouse/ai-governance/. .

      - name: Rebind campaign to Laveer root
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json

          old_urls = [
              'https://russelldudek.github.io/Westinghouse/ai-governance/',
              'https://russelldudek.github.io/Westinghouse/ai-governance',
          ]
          new_url = 'https://russelldudek.github.io/Laveer/'
          text_ext = {'.html','.css','.js','.json','.md','.txt','.xml','.yml','.yaml'}
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts or path.suffix.lower() not in text_ext:
                  continue
              text = path.read_text(errors='strict')
              for old in old_urls:
                  text = text.replace(old, new_url)
              text = text.replace('russelldudek/Westinghouse', 'russelldudek/Laveer')
              text = text.replace('Westinghouse/ai-governance/', 'Laveer/')
              path.write_text(text)

          metadata = Path('campaign-metadata.json')
          if metadata.exists():
              data = json.loads(metadata.read_text())
              data['campaign_repository'] = 'russelldudek/Laveer'
              data['campaign_path'] = '/'
              data['live_site'] = new_url
              data['campaign_state'] = 'published-to-main'
              metadata.write_text(json.dumps(data, indent=2) + '\n')

          Path('README.md').write_text('''# Westinghouse Director, AI Strategic Governance — Independent Candidate Campaign\n\nIndependent candidate campaign by Russell Dudek for Westinghouse Electric Company’s Director, AI Strategic Governance role (Requisition 30387).\n\n**Candidate thesis:** Make assurance portable.\n\n- Canonical repository: `russelldudek/Laveer`\n- Canonical branch: `main`\n- Live candidate vision: `https://russelldudek.github.io/Laveer/`\n- Job posting: `https://careers.westinghousenuclear.com/job/Cranberry-Township-Director%2C-AI-Strategic-Governance-NC/1363237000/`\n\nThe repository root contains the complete candidate-vision site, exactly two-page résumé, exactly one-page cover letter, interview thesis brief, 120-day plan, AI Assurance Case Standard, brand intelligence, research record, and generated PDFs.\n''')

          Path('campaign-audit.md').write_text('''# Campaign Audit\n\n**Campaign state: published to the Laveer `main` branch.**\n\n- Canonical repository: `russelldudek/Laveer`\n- Canonical branch: `main`\n- Candidate-vision root: `https://russelldudek.github.io/Laveer/`\n- Manifest: passed\n- Official Westinghouse identity: locally committed and visible\n- Candidate/document URL rebinding: passed\n- Résumé PDF: exactly 2 pages\n- Cover-letter PDF: exactly 1 page\n- Interview brief PDF: exactly 4 pages\n- 120-day plan PDF: exactly 3 pages\n- AI Assurance Case Standard PDF: exactly 2 pages\n- Candidate-facing confidentiality scan: passed\n- Forbidden internal-name matches: 0\n\nCompany-specific use cases, controls, and operating recommendations are candidate hypotheses for discovery rather than claims about undisclosed Westinghouse systems.\n''')
          PY
          touch .nojekyll

      - name: Regenerate and verify PDFs
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --quiet weasyprint pypdf
          python - <<'PY'
          from pathlib import Path
          from weasyprint import HTML
          from pypdf import PdfReader

          jobs = [
              ('resume.html', 'docs/Russell-Dudek-Westinghouse-AI-Governance-Resume.pdf', 2),
              ('cover-letter.html', 'docs/Russell-Dudek-Westinghouse-AI-Governance-Cover-Letter.pdf', 1),
              ('interview-brief.html', 'docs/Russell-Dudek-Westinghouse-Interview-Thesis-Brief.pdf', 4),
              ('120-day-plan.html', 'docs/Russell-Dudek-Westinghouse-120-Day-Plan.pdf', 3),
              ('assurance-case-standard.html', 'docs/Russell-Dudek-Westinghouse-AI-Assurance-Case-Standard.pdf', 2),
          ]
          Path('docs').mkdir(exist_ok=True)
          for source, target, expected in jobs:
              HTML(filename=source, base_url=Path('.').resolve().as_uri() + '/').write_pdf(target)
              actual = len(PdfReader(target).pages)
              if actual != expected:
                  raise SystemExit(f'{target}: expected {expected} pages, got {actual}')
          PY

      - name: Enforce publication contracts
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'Director, AI Strategic Governance' index.html
          grep -q 'https://russelldudek.github.io/Laveer/' resume.html
          grep -q 'https://russelldudek.github.io/Laveer/' cover-letter.html
          ! grep -RniE 'russelldudek\.github\.io/Westinghouse/ai-governance|role[[:space:]_.-]*forge' --exclude-dir=.git --exclude='*.pdf' .
          python - <<'PY'
          import re, subprocess
          from pathlib import Path
          pattern = re.compile(r'role[\s_.-]*forge', re.I)
          for pdf in Path('docs').glob('*.pdf'):
              text = subprocess.check_output(['pdftotext', str(pdf), '-'], text=True, errors='ignore')
              if pattern.search(text):
                  raise SystemExit(f'forbidden internal name in {pdf}')
              if 'https://russelldudek.github.io/Laveer/' not in text:
                  raise SystemExit(f'Laveer candidate URL missing from {pdf}')
          PY

      - name: Commit complete root campaign to main
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/publish-laveer-campaign.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'Candidate Campaign Publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Publish complete AI governance campaign to main'
          git push origin HEAD:main
