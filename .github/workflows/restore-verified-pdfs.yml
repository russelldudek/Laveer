name: Restore verified PDF page contracts

on:
  push:
    paths:
      - '.github/workflows/restore-verified-pdfs.yml'

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PDF inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Restore verified campaign PDFs
        shell: bash
        run: |
          set -euo pipefail
          verified_ref='7c9d2be92529126ae633e69f15d1fc27babad41b'
          interview='docs/Russell-Dudek-Westinghouse-Interview-Thesis-Brief.pdf'
          standard='docs/Russell-Dudek-Westinghouse-AI-Assurance-Case-Standard.pdf'

          git checkout "$verified_ref" -- "$interview" "$standard"

          interview_pages="$(pdfinfo "$interview" | awk '/^Pages:/ {print $2}')"
          standard_pages="$(pdfinfo "$standard" | awk '/^Pages:/ {print $2}')"
          test "$interview_pages" = '4'
          test "$standard_pages" = '2'

          {
            echo 'Verified PDF contracts'
            echo
            echo 'Interview Thesis Brief'
            pdfinfo "$interview" | grep -E '^(Pages|Page size|File size):'
            echo
            echo 'AI Assurance Case Standard'
            pdfinfo "$standard" | grep -E '^(Pages|Page size|File size):'
            echo
            echo "Restored from verified campaign ref: ${verified_ref}"
          } > pdf-verification.txt

      - name: Commit restored PDFs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Russell Dudek'
          git config user.email '35631821+russelldudek@users.noreply.github.com'
          git add docs/Russell-Dudek-Westinghouse-Interview-Thesis-Brief.pdf docs/Russell-Dudek-Westinghouse-AI-Assurance-Case-Standard.pdf pdf-verification.txt
          git commit -m 'Restore verified governance PDF contracts'
          git push origin main
