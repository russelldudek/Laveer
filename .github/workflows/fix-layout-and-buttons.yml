name: Fix layout and artifact links

on:
  push:
    paths:
      - '.github/workflows/fix-layout-and-buttons.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply alignment and interaction fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('styles.css')
          css = path.read_text(encoding='utf-8')
          start = '/* LAVEER-LAYOUT-FIXES-START */'
          end = '/* LAVEER-LAYOUT-FIXES-END */'
          css = re.sub(r'\n?/\* LAVEER-LAYOUT-FIXES-START \*/.*?/\* LAVEER-LAYOUT-FIXES-END \*/\n?', '\n', css, flags=re.S)

          fixes = r'''
          /* LAVEER-LAYOUT-FIXES-START */
          /* Keep paired document cards on the same baseline and at equal height. */
          .doc-grid-equal {
            align-items: stretch;
            grid-auto-rows: 1fr;
          }
          .doc-grid-equal > .side-box,
          .doc-grid-equal > .side-box + .side-box {
            height: 100%;
            margin-top: 0;
          }

          /* Give every posture an identical vertical box and text baseline. */
          .posture-rail {
            align-items: stretch;
          }
          .posture-step {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 8px 6px;
            line-height: 1.15;
          }

          /* Make the five campaign artifacts equal, fully clickable controls. */
          .document-links {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            align-items: stretch;
            width: min(100%, 1500px);
            margin: 36px auto 0;
          }
          .document-links .btn {
            width: 100%;
            height: 100%;
            min-height: 66px;
            padding: 16px 20px;
            cursor: pointer;
            pointer-events: auto;
            line-height: 1.2;
            text-align: center;
          }
          .document-links .btn:hover,
          .document-links .btn:focus-visible,
          .document-links .btn.secondary:hover,
          .document-links .btn.secondary:focus-visible {
            color: var(--wh-blue-deep);
            background: #fff;
            border-color: #fff;
          }

          @media (max-width: 1100px) {
            .document-links {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }
          }
          @media (max-width: 620px) {
            .document-links {
              grid-template-columns: 1fr;
            }
          }
          /* LAVEER-LAYOUT-FIXES-END */
          '''

          path.write_text(css.rstrip() + '\n\n' + fixes.strip() + '\n', encoding='utf-8')

          index = Path('index.html').read_text(encoding='utf-8')
          required = [
              'href="resume.html"',
              'href="cover-letter.html"',
              'href="interview-brief.html"',
              'href="120-day-plan.html"',
              'href="assurance-case-standard.html"',
          ]
          missing = [item for item in required if item not in index]
          if missing:
              raise SystemExit(f'Missing artifact links: {missing}')

          updated = path.read_text(encoding='utf-8')
          for expected in [start, end, 'grid-auto-rows: 1fr', 'background: #fff', 'pointer-events: auto']:
              if expected not in updated:
                  raise SystemExit(f'CSS verification failed: {expected}')
          PY

      - name: Commit corrected layout
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Russell Dudek'
          git config user.email '35631821+russelldudek@users.noreply.github.com'
          git add styles.css
          git commit -m 'Align cards and activate artifact buttons'
          git push origin main
