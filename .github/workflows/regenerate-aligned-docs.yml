name: Regenerate aligned campaign documents

on:
  push:
    paths:
      - '.github/workflows/regenerate-aligned-docs.yml'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PDF inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Render corrected PDFs
        shell: bash
        run: |
          set -euo pipefail
          browser="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium || true)"
          if [ -z "$browser" ]; then
            echo 'No Chromium-compatible browser found.' >&2
            exit 1
          fi

          render_pdf() {
            local html="$1"
            local output="$2"
            rm -f "$output"
            timeout 90 "$browser" \
              --headless=new \
              --no-sandbox \
              --disable-gpu \
              --disable-dev-shm-usage \
              --disable-background-networking \
              --disable-extensions \
              --no-first-run \
              --no-pdf-header-footer \
              --run-all-compositor-stages-before-draw \
              --virtual-time-budget=1500 \
              --print-to-pdf="$output" \
              "file://$PWD/$html"
            test -s "$output"
          }

          render_pdf interview-brief.html docs/Russell-Dudek-Westinghouse-Interview-Thesis-Brief.pdf
          render_pdf assurance-case-standard.html docs/Russell-Dudek-Westinghouse-AI-Assurance-Case-Standard.pdf

      - name: Verify page counts and document integrity
        shell: bash
        run: |
          set -euo pipefail
          interview='docs/Russell-Dudek-Westinghouse-Interview-Thesis-Brief.pdf'
          standard='docs/Russell-Dudek-Westinghouse-AI-Assurance-Case-Standard.pdf'
          test "$(pdfinfo "$interview" | awk '/^Pages:/ {print $2}')" = "4"
          test "$(pdfinfo "$standard" | awk '/^Pages:/ {print $2}')" = "2"
          test "$(stat -c %s "$interview")" -gt 50000
          test "$(stat -c %s "$standard")" -gt 50000
          grep -q 'grid-auto-rows: 1fr' styles.css
          grep -q 'doc-grid-equal > .side-box + .side-box' styles.css

      - name: Commit regenerated PDFs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Russell Dudek'
          git config user.email '35631821+russelldudek@users.noreply.github.com'
          git add docs/Russell-Dudek-Westinghouse-Interview-Thesis-Brief.pdf docs/Russell-Dudek-Westinghouse-AI-Assurance-Case-Standard.pdf
          git commit -m 'Regenerate aligned governance documents'
          git push origin main
