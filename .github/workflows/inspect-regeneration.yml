name: Inspect document regeneration

on:
  push:
    paths:
      - '.github/workflows/inspect-regeneration.yml'

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture run diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: aa873ff21fae8ff19dc3d67273e8c0e5650de1dd
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          auth=(-H "Authorization: Bearer ${GH_TOKEN}" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28')
          curl -fsSL "${auth[@]}" "${api}/actions/runs?head_sha=${TARGET_SHA}&per_page=10" > /tmp/runs.json
          run_id="$(python - <<'PY'
          import json
          data=json.load(open('/tmp/runs.json'))
          runs=data.get('workflow_runs', [])
          print(runs[0]['id'] if runs else '')
          PY
          )"
          {
            echo "target_sha=${TARGET_SHA}"
            echo "run_id=${run_id}"
            echo '--- runs ---'
            cat /tmp/runs.json
          } > regeneration-diagnostic.txt
          if [ -n "$run_id" ]; then
            curl -fsSL "${auth[@]}" "${api}/actions/runs/${run_id}/jobs?per_page=100" > /tmp/jobs.json
            {
              echo
              echo '--- jobs ---'
              cat /tmp/jobs.json
            } >> regeneration-diagnostic.txt
            python - <<'PY' > /tmp/job_ids.txt
          import json
          data=json.load(open('/tmp/jobs.json'))
          for job in data.get('jobs', []):
              print(job['id'])
          PY
            while read -r job_id; do
              [ -n "$job_id" ] || continue
              echo >> regeneration-diagnostic.txt
              echo "--- job ${job_id} logs ---" >> regeneration-diagnostic.txt
              curl -fsSL -L "${auth[@]}" "${api}/actions/jobs/${job_id}/logs" >> regeneration-diagnostic.txt || true
            done < /tmp/job_ids.txt
          fi
      - name: Commit diagnostics
        run: |
          git config user.name 'Russell Dudek'
          git config user.email '35631821+russelldudek@users.noreply.github.com'
          git add regeneration-diagnostic.txt
          git commit -m 'Record document regeneration diagnostics'
          git push origin main
